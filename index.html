<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financeiro – Loja de Personalizados</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d14; color: #e2e8f0; font-family: 'Georgia', serif; }
    input, select, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; } 
    ::-webkit-scrollbar-track { background: #ffffff08; }
    ::-webkit-scrollbar-thumb { background: #c084fc44; border-radius: 10px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ─── SUPABASE CONFIG ──────────────────────────────────────────────────────────
const SUPABASE_URL = "https://guvpqriitqspggznwtkr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1dnBxcmlpdHFzcGdnem53dGtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjE2NjYsImV4cCI6MjA4OTYzNzY2Nn0.X0GVsoMac7dpOVzCZPg6CGklWIbdTB0sD8_tAYSl6FU";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const { useState, useEffect } = React;

const categories = ["Canecas", "Camisetas", "Quadros", "Convites", "Topos de Bolo", "Adesivos", "Cartonagem", "Outros"];

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("dashboard");
  const [data, setData] = useState({ transactions: [], products: [], budgets: [] });
  const [loaded, setLoaded] = useState(false);
  const [toast, setToast] = useState(null);

  // Carrega todos os dados do Supabase
  useEffect(() => {
    (async () => {
      try {
        const [txRes, prRes, buRes] = await Promise.all([
          supabase.from("transactions").select("*").order("date", { ascending: false }),
          supabase.from("products").select("*").order("id", { ascending: false }),
          supabase.from("budgets").select("*").order("date", { ascending: false }),
        ]);
        setData({
          transactions: txRes.data || [],
          products: prRes.data || [],
          budgets: buRes.data || [],
        });
      } catch (e) {
        console.error("Erro ao carregar dados:", e);
      }
      setLoaded(true);
    })();
  }, []);

  function showToast(msg, type = "success") {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2800);
  }

  // Funções de CRUD para transactions
  async function addTransaction(form) {
    const row = {
      type: form.type,
      description: form.description,
      amount: parseFloat(form.amount),
      category: form.category,
      date: form.date,
    };
    const { data: inserted, error } = await supabase.from("transactions").insert([row]).select();
    if (error) { showToast("Erro ao salvar lançamento", "error"); return false; }
    setData(d => ({ ...d, transactions: [inserted[0], ...d.transactions] }));
    showToast("Lançamento adicionado!");
    return true;
  }

  async function removeTransaction(id) {
    const { error } = await supabase.from("transactions").delete().eq("id", id);
    if (error) { showToast("Erro ao remover", "error"); return; }
    setData(d => ({ ...d, transactions: d.transactions.filter(t => t.id !== id) }));
    showToast("Removido.");
  }

  // Funções de CRUD para products
  async function addProduct(form) {
    const row = {
      name: form.name,
      category: form.category,
      cost: parseFloat(form.cost),
      price: parseFloat(form.price),
    };
    const { data: inserted, error } = await supabase.from("products").insert([row]).select();
    if (error) { showToast("Erro ao salvar produto", "error"); return false; }
    setData(d => ({ ...d, products: [inserted[0], ...d.products] }));
    showToast("Produto adicionado!");
    return true;
  }

  async function removeProduct(id) {
    const { error } = await supabase.from("products").delete().eq("id", id);
    if (error) { showToast("Erro ao remover", "error"); return; }
    setData(d => ({ ...d, products: d.products.filter(p => p.id !== id) }));
    showToast("Removido.");
  }

  // Funções de CRUD para budgets
  async function addBudget(form) {
    const row = {
      client: form.client,
      event: form.event,
      items: form.items,
      total: parseFloat(form.total),
      date: form.date,
      status: "pendente",
    };
    const { data: inserted, error } = await supabase.from("budgets").insert([row]).select();
    if (error) { showToast("Erro ao salvar orçamento", "error"); return false; }
    setData(d => ({ ...d, budgets: [inserted[0], ...d.budgets] }));
    showToast("Orçamento adicionado!");
    return true;
  }

  async function updateBudgetStatus(id, status) {
    const { error } = await supabase.from("budgets").update({ status }).eq("id", id);
    if (error) { showToast("Erro ao atualizar status", "error"); return; }
    setData(d => ({ ...d, budgets: d.budgets.map(b => b.id === id ? { ...b, status } : b) }));
  }

  async function removeBudget(id) {
    const { error } = await supabase.from("budgets").delete().eq("id", id);
    if (error) { showToast("Erro ao remover", "error"); return; }
    setData(d => ({ ...d, budgets: d.budgets.filter(b => b.id !== id) }));
    showToast("Removido.");
  }

  if (!loaded) return (
    <div style={styles.loading}>
      <div style={styles.spinner} />
      <p style={{ color: "#c084fc", marginTop: 16 }}>Carregando...</p>
    </div>
  );

  return (
    <div style={styles.root}>
      <div style={styles.bgDecor1} />
      <div style={styles.bgDecor2} />

      <header style={styles.header}>
        <div style={styles.headerInner}>
          <div>
            <div style={styles.logo}>✦ Financeiro</div>
            <div style={styles.logoSub}>Loja de Personalizados</div>
          </div>
          <nav style={styles.nav}>
            {[
              { id: "dashboard", label: "Resumo", icon: "◈" },
              { id: "transactions", label: "Lançamentos", icon: "⊕" },
              { id: "products", label: "Produtos", icon: "◎" },
              { id: "budgets", label: "Orçamentos", icon: "◇" },
            ].map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                style={{ ...styles.navBtn, ...(tab === t.id ? styles.navBtnActive : {}) }}>
                <span style={{ marginRight: 5 }}>{t.icon}</span>{t.label}
              </button>
            ))}
          </nav>
        </div>
      </header>

      <main style={styles.main}>
        {tab === "dashboard" && <Dashboard data={data} />}
        {tab === "transactions" && <Transactions data={data} addTransaction={addTransaction} removeTransaction={removeTransaction} showToast={showToast} />}
        {tab === "products" && <Products data={data} addProduct={addProduct} removeProduct={removeProduct} showToast={showToast} />}
        {tab === "budgets" && <Budgets data={data} addBudget={addBudget} updateBudgetStatus={updateBudgetStatus} removeBudget={removeBudget} showToast={showToast} />}
      </main>

      {toast && (
        <div style={{ ...styles.toast, background: toast.type === "success" ? "#14532d" : "#7f1d1d" }}>
          {toast.type === "success" ? "✓" : "✕"} {toast.msg}
        </div>
      )}
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({ data }) {
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
  const monthly = data.transactions.filter(t => t.date?.startsWith(thisMonth));
  const totalIn = monthly.filter(t => t.type === "entrada").reduce((s, t) => s + Number(t.amount), 0);
  const totalOut = monthly.filter(t => t.type === "saida").reduce((s, t) => s + Number(t.amount), 0);
  const profit = totalIn - totalOut;

  const byCategory = {};
  monthly.filter(t => t.type === "entrada").forEach(t => {
    byCategory[t.category] = (byCategory[t.category] || 0) + Number(t.amount);
  });
  const topCats = Object.entries(byCategory).sort((a, b) => b[1] - a[1]).slice(0, 4);
  const recent = [...data.transactions].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
  const monthLabel = now.toLocaleString("pt-BR", { month: "long", year: "numeric" });

  return (
    <div>
      <h2 style={styles.sectionTitle}>Resumo de <span style={{ color: "#c084fc" }}>{monthLabel}</span></h2>
      <div style={styles.kpiGrid}>
        <KPI label="Entradas" value={totalIn} color="#4ade80" icon="↑" />
        <KPI label="Saídas" value={totalOut} color="#f87171" icon="↓" />
        <KPI label="Lucro" value={profit} color={profit >= 0 ? "#a78bfa" : "#f87171"} icon="◈" />
      </div>
      <div style={styles.twoCol}>
        <div style={styles.card}>
          <div style={styles.cardTitle}>Mais Vendidos (este mês)</div>
          {topCats.length === 0 ? (
            <p style={styles.empty}>Nenhuma entrada registrada ainda.</p>
          ) : topCats.map(([cat, val]) => (
            <div key={cat} style={styles.barRow}>
              <span style={styles.barLabel}>{cat}</span>
              <div style={styles.barTrack}>
                <div style={{ ...styles.barFill, width: `${Math.min(100, (val / totalIn) * 100)}%` }} />
              </div>
              <span style={styles.barValue}>{fmt(val)}</span>
            </div>
          ))}
        </div>
        <div style={styles.card}>
          <div style={styles.cardTitle}>Últimas Transações</div>
          {recent.length === 0 ? (
            <p style={styles.empty}>Nenhuma transação ainda.</p>
          ) : recent.map(t => (
            <div key={t.id} style={styles.txRow}>
              <div>
                <div style={styles.txDesc}>{t.description}</div>
                <div style={styles.txMeta}>{t.category} · {t.date}</div>
              </div>
              <div style={{ ...styles.txAmount, color: t.type === "entrada" ? "#4ade80" : "#f87171" }}>
                {t.type === "entrada" ? "+" : "-"}{fmt(t.amount)}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function KPI({ label, value, color, icon }) {
  return (
    <div style={{ ...styles.kpiCard, borderColor: color + "44" }}>
      <div style={{ ...styles.kpiIcon, color }}>{icon}</div>
      <div style={{ ...styles.kpiValue, color }}>{fmt(value)}</div>
      <div style={styles.kpiLabel}>{label}</div>
    </div>
  );
}

// ─── TRANSACTIONS ─────────────────────────────────────────────────────────────
function Transactions({ data, addTransaction, removeTransaction, showToast }) {
  const [form, setForm] = useState({ type: "entrada", description: "", amount: "", category: categories[0], date: today() });
  const [filter, setFilter] = useState("todos");
  const [saving, setSaving] = useState(false);

  async function add() {
    if (!form.description || !form.amount) return showToast("Preencha descrição e valor", "error");
    setSaving(true);
    await addTransaction(form);
    setForm(f => ({ ...f, description: "", amount: "" }));
    setSaving(false);
  }

  const filtered = filter === "todos" ? data.transactions : data.transactions.filter(t => t.type === filter);
  const sorted = [...filtered].sort((a, b) => new Date(b.date) - new Date(a.date));

  return (
    <div>
      <h2 style={styles.sectionTitle}>Lançamentos</h2>
      <div style={styles.card}>
        <div style={styles.cardTitle}>Novo Lançamento</div>
        <div style={styles.formGrid}>
          <div style={styles.typeToggle}>
            {["entrada", "saida"].map(t => (
              <button key={t} onClick={() => setForm(f => ({ ...f, type: t }))}
                style={{ ...styles.typeBtn, ...(form.type === t ? (t === "entrada" ? styles.typeBtnEntrada : styles.typeBtnSaida) : {}) }}>
                {t === "entrada" ? "↑ Entrada" : "↓ Saída"}
              </button>
            ))}
          </div>
          <input style={styles.input} placeholder="Descrição" value={form.description} onChange={e => setForm(f => ({ ...f, description: e.target.value }))} />
          <input style={styles.input} placeholder="Valor (R$)" type="number" value={form.amount} onChange={e => setForm(f => ({ ...f, amount: e.target.value }))} />
          <select style={styles.input} value={form.category} onChange={e => setForm(f => ({ ...f, category: e.target.value }))}>
            {categories.map(c => <option key={c}>{c}</option>)}
          </select>
          <input style={styles.input} type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} />
          <button style={{ ...styles.btnPrimary, opacity: saving ? 0.6 : 1 }} onClick={add} disabled={saving}>
            {saving ? "Salvando..." : "Adicionar"}
          </button>
        </div>
      </div>
      <div style={{ display: "flex", gap: 8, margin: "20px 0 12px" }}>
        {["todos", "entrada", "saida"].map(f => (
          <button key={f} onClick={() => setFilter(f)}
            style={{ ...styles.filterBtn, ...(filter === f ? styles.filterBtnActive : {}) }}>
            {f === "todos" ? "Todos" : f === "entrada" ? "↑ Entradas" : "↓ Saídas"}
          </button>
        ))}
      </div>
      {sorted.length === 0 ? <p style={styles.empty}>Nenhum lançamento ainda.</p> : sorted.map(t => (
        <div key={t.id} style={{ ...styles.txCard, borderLeft: `3px solid ${t.type === "entrada" ? "#4ade80" : "#f87171"}` }}>
          <div style={{ flex: 1 }}>
            <div style={styles.txDesc}>{t.description}</div>
            <div style={styles.txMeta}>{t.category} · {t.date}</div>
          </div>
          <div style={{ ...styles.txAmount, color: t.type === "entrada" ? "#4ade80" : "#f87171" }}>
            {t.type === "entrada" ? "+" : "-"}{fmt(t.amount)}
          </div>
          <button onClick={() => removeTransaction(t.id)} style={styles.btnRemove}>✕</button>
        </div>
      ))}
    </div>
  );
}

// ─── PRODUCTS ─────────────────────────────────────────────────────────────────
function Products({ data, addProduct, removeProduct, showToast }) {
  const [form, setForm] = useState({ name: "", category: categories[0], cost: "", price: "" });
  const [saving, setSaving] = useState(false);

  async function add() {
    if (!form.name || !form.cost || !form.price) return showToast("Preencha todos os campos", "error");
    setSaving(true);
    await addProduct(form);
    setForm(f => ({ ...f, name: "", cost: "", price: "" }));
    setSaving(false);
  }

  return (
    <div>
      <h2 style={styles.sectionTitle}>Lucro por Produto</h2>
      <div style={styles.card}>
        <div style={styles.cardTitle}>Novo Produto</div>
        <div style={styles.formGrid}>
          <input style={styles.input} placeholder="Nome do produto" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} />
          <select style={styles.input} value={form.category} onChange={e => setForm(f => ({ ...f, category: e.target.value }))}>
            {categories.map(c => <option key={c}>{c}</option>)}
          </select>
          <input style={styles.input} placeholder="Custo (R$)" type="number" value={form.cost} onChange={e => setForm(f => ({ ...f, cost: e.target.value }))} />
          <input style={styles.input} placeholder="Preço de venda (R$)" type="number" value={form.price} onChange={e => setForm(f => ({ ...f, price: e.target.value }))} />
          <button style={{ ...styles.btnPrimary, opacity: saving ? 0.6 : 1 }} onClick={add} disabled={saving}>
            {saving ? "Salvando..." : "Calcular e Salvar"}
          </button>
        </div>
      </div>
      {data.products.length === 0 ? <p style={styles.empty}>Nenhum produto cadastrado ainda.</p> : (
        <div style={styles.productGrid}>
          {data.products.map(p => {
            const lucro = Number(p.price) - Number(p.cost);
            const margem = ((lucro / Number(p.price)) * 100).toFixed(1);
            return (
              <div key={p.id} style={styles.productCard}>
                <div style={styles.productName}>{p.name}</div>
                <div style={styles.productCat}>{p.category}</div>
                <div style={styles.productRow}><span>Custo</span><span style={{ color: "#f87171" }}>{fmt(p.cost)}</span></div>
                <div style={styles.productRow}><span>Venda</span><span style={{ color: "#4ade80" }}>{fmt(p.price)}</span></div>
                <div style={{ ...styles.productRow, fontWeight: 700, borderTop: "1px solid #ffffff10", paddingTop: 8, marginTop: 4 }}>
                  <span>Lucro</span>
                  <span style={{ color: lucro >= 0 ? "#c084fc" : "#f87171" }}>{fmt(lucro)}</span>
                </div>
                <div style={styles.margemBar}>
                  <div style={{ ...styles.margemFill, width: `${Math.min(100, Math.max(0, parseFloat(margem)))}%` }} />
                </div>
                <div style={{ textAlign: "right", fontSize: 11, color: "#a78bfa", marginTop: 4 }}>Margem: {margem}%</div>
                <button onClick={() => removeProduct(p.id)} style={{ ...styles.btnRemove, marginTop: 12, width: "100%" }}>✕ Remover</button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── BUDGETS ──────────────────────────────────────────────────────────────────
function Budgets({ data, addBudget, updateBudgetStatus, removeBudget, showToast }) {
  const [form, setForm] = useState({ client: "", event: "", items: "", total: "", date: today() });
  const [saving, setSaving] = useState(false);

  async function add() {
    if (!form.client || !form.total) return showToast("Preencha cliente e valor", "error");
    setSaving(true);
    await addBudget(form);
    setForm(f => ({ ...f, client: "", event: "", items: "", total: "" }));
    setSaving(false);
  }

  const statusColor = { pendente: "#facc15", aprovado: "#4ade80", recusado: "#f87171" };

  return (
    <div>
      <h2 style={styles.sectionTitle}>Orçamentos de Clientes</h2>
      <div style={styles.card}>
        <div style={styles.cardTitle}>Novo Orçamento</div>
        <div style={styles.formGrid}>
          <input style={styles.input} placeholder="Nome do cliente" value={form.client} onChange={e => setForm(f => ({ ...f, client: e.target.value }))} />
          <input style={styles.input} placeholder="Evento (ex: Aniversário 30 anos)" value={form.event} onChange={e => setForm(f => ({ ...f, event: e.target.value }))} />
          <input style={styles.input} placeholder="Itens (ex: 50 convites, topo de bolo)" value={form.items} onChange={e => setForm(f => ({ ...f, items: e.target.value }))} />
          <input style={styles.input} placeholder="Valor total (R$)" type="number" value={form.total} onChange={e => setForm(f => ({ ...f, total: e.target.value }))} />
          <input style={styles.input} type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} />
          <button style={{ ...styles.btnPrimary, opacity: saving ? 0.6 : 1 }} onClick={add} disabled={saving}>
            {saving ? "Salvando..." : "Salvar Orçamento"}
          </button>
        </div>
      </div>
      {data.budgets.length === 0 ? <p style={styles.empty}>Nenhum orçamento ainda.</p> : data.budgets.map(b => (
        <div key={b.id} style={{ ...styles.txCard, borderLeft: `3px solid ${statusColor[b.status] || "#facc15"}` }}>
          <div style={{ flex: 1 }}>
            <div style={styles.txDesc}>{b.client} <span style={{ color: "#a78bfa", fontWeight: 400 }}>· {b.event}</span></div>
            <div style={styles.txMeta}>{b.items} · {b.date}</div>
            <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
              {["pendente", "aprovado", "recusado"].map(s => (
                <button key={s} onClick={() => updateBudgetStatus(b.id, s)}
                  style={{ ...styles.statusBtn, background: b.status === s ? (statusColor[s] + "33") : "transparent", borderColor: statusColor[s], color: b.status === s ? statusColor[s] : "#666" }}>
                  {s.charAt(0).toUpperCase() + s.slice(1)}
                </button>
              ))}
            </div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ ...styles.txAmount, fontSize: 18, color: "#c084fc" }}>{fmt(b.total)}</div>
            <button onClick={() => removeBudget(b.id)} style={{ ...styles.btnRemove, marginTop: 8 }}>✕</button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function fmt(v) {
  return new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(v || 0);
}
function today() {
  return new Date().toISOString().split("T")[0];
}

// ─── STYLES ───────────────────────────────────────────────────────────────────
const styles = {
  root: { minHeight: "100vh", background: "#0d0d14", color: "#e2e8f0", fontFamily: "'Georgia', serif", position: "relative" },
  bgDecor1: { position: "fixed", top: -120, right: -120, width: 400, height: 400, background: "radial-gradient(circle, #7c3aed22, transparent 70%)", pointerEvents: "none", zIndex: 0 },
  bgDecor2: { position: "fixed", bottom: -80, left: -80, width: 300, height: 300, background: "radial-gradient(circle, #c084fc18, transparent 70%)", pointerEvents: "none", zIndex: 0 },
  loading: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh" },
  spinner: { width: 36, height: 36, border: "3px solid #c084fc44", borderTop: "3px solid #c084fc", borderRadius: "50%", animation: "spin 1s linear infinite" },
  header: { background: "#0d0d14dd", backdropFilter: "blur(12px)", borderBottom: "1px solid #ffffff10", position: "sticky", top: 0, zIndex: 100 },
  headerInner: { maxWidth: 900, margin: "0 auto", padding: "14px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 },
  logo: { fontSize: 20, fontWeight: 700, color: "#c084fc", letterSpacing: 1 },
  logoSub: { fontSize: 11, color: "#888", letterSpacing: 2, textTransform: "uppercase" },
  nav: { display: "flex", gap: 4, flexWrap: "wrap" },
  navBtn: { background: "transparent", border: "1px solid transparent", color: "#888", padding: "7px 14px", borderRadius: 8, cursor: "pointer", fontSize: 13 },
  navBtnActive: { background: "#c084fc18", border: "1px solid #c084fc55", color: "#c084fc" },
  main: { maxWidth: 900, margin: "0 auto", padding: "28px 20px 60px", position: "relative", zIndex: 1 },
  sectionTitle: { fontSize: 24, fontWeight: 700, marginBottom: 24, color: "#f1f5f9" },
  kpiGrid: { display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16, marginBottom: 24 },
  kpiCard: { background: "#ffffff06", border: "1px solid", borderRadius: 16, padding: "20px 16px", textAlign: "center" },
  kpiIcon: { fontSize: 22, marginBottom: 6 },
  kpiValue: { fontSize: 22, fontWeight: 700, marginBottom: 4 },
