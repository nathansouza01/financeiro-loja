<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>Financeiro – Loja de Personalizados</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
  <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    :root {
      --accent: #e8a8c0;
      --accent-strong: #d4729a;
      --accent-soft: #f4d4e2;
      --green: #34c759;
      --red: #ff453a;
      --yellow: #ffd60a;
      --gold: #c9971f;
      --silver: #8a8d91;
      --bronze: #b06a3a;
    }

    /* ---- LIGHT THEME (default) ---- */
    :root {
      --bg-gradient: radial-gradient(circle at 15% 0%, #fbe4ed 0%, transparent 45%),
                      radial-gradient(circle at 85% 15%, #e3eefc 0%, transparent 40%),
                      radial-gradient(circle at 50% 100%, #fdf0e8 0%, transparent 50%),
                      #f0f1f5;
      --glass-bg: rgba(255, 255, 255, 0.55);
      --glass-bg-strong: rgba(255, 255, 255, 0.72);
      --glass-border: rgba(255, 255, 255, 0.9);
      --glass-highlight: rgba(255, 255, 255, 0.8);
      --text: #1c1c1e;
      --text-secondary: #6e6e73;
      --text-tertiary: #9a9aa0;
      --separator: rgba(60, 60, 67, 0.1);
      --fill: rgba(120, 120, 128, 0.1);
      --shadow: 0 1px 2px rgba(30,20,30,0.04), 0 8px 24px rgba(30,20,30,0.07);
      --shadow-elevated: 0 8px 30px rgba(30,20,30,0.14), 0 2px 8px rgba(30,20,30,0.08);
      --blur: 24px;
    }

    /* ---- DARK THEME (auto via system) ---- */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-gradient: radial-gradient(circle at 15% 0%, #3a2230 0%, transparent 45%),
                        radial-gradient(circle at 85% 15%, #1f2a3a 0%, transparent 40%),
                        radial-gradient(circle at 50% 100%, #2a2018 0%, transparent 50%),
                        #0b0b0d;
        --glass-bg: rgba(40, 40, 44, 0.55);
        --glass-bg-strong: rgba(45, 45, 50, 0.72);
        --glass-border: rgba(255, 255, 255, 0.12);
        --glass-highlight: rgba(255, 255, 255, 0.08);
        --text: #f5f5f7;
        --text-secondary: #a3a3a8;
        --text-tertiary: #6e6e73;
        --separator: rgba(255, 255, 255, 0.08);
        --fill: rgba(255, 255, 255, 0.07);
        --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.35);
        --shadow-elevated: 0 12px 36px rgba(0,0,0,0.55);
        --blur: 24px;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { min-height: 100%; }

    body {
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--blur)) saturate(160%);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(160%);
      border: 1px solid var(--glass-border);
      position: relative;
    }
    .glass::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, var(--glass-highlight) 0%, transparent 35%);
      pointer-events: none;
    }

    input, select, textarea, button { font-family: inherit; }
    input::placeholder, textarea::placeholder { color: var(--text-tertiary); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 10px; }
    option { background: var(--glass-bg-strong); color: var(--text); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const SUPABASE_URL = "https://guvpqriitqspggznwtkr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1dnBxcmlpdHFzcGdnem53dGtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjE2NjYsImV4cCI6MjA4OTYzNzY2Nn0.X0GVsoMac7dpOVzCZPg6CGklWIbdTB0sD8_tAYSl6FU";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const { useState, useEffect, useMemo } = React;

// Categorias em ordem alfabética
const categories = [
  "Adesivos", "Camisetas", "Canecas",
  "Card com bala/presilha/pompom/bis/chocolate",
  "Cartonagem", "Cesta MDF", "Chaveiros", "Convites",
  "Festa na Mesa", "Fotos", "Kits", "Outros", "Painel",
  "Placa MDF", "Quadros", "Tags", "Topos de Bolo",
];

const clientTiers = [
  { id: "ouro", label: "Ouro", color: "#c9971f" },
  { id: "prata", label: "Prata", color: "#8a8d91" },
  { id: "bronze", label: "Bronze", color: "#b06a3a" },
];

const clientSegments = ["Noiva", "Festa", "Revenda", "Outro"];

const paymentMethods = ["Pix", "Dinheiro", "Cartão de Crédito", "Cartão de Débito", "Transferência/Depósito", "Permuta"];

// Dados fixos da empresa (editáveis aqui no código se precisar mudar)
const COMPANY = {
  name: "Mimos da Lídia",
  tagline: "Artigos e Brindes Personalizados",
  owner: "Lidia Araujo Rodrigues",
  address: "Rua do Campo, 23 - Santana do Sobrado-BA",
  phone: "(74) 98844-0460",
  bank: "Itaú",
  pixKey: "06124945517",
  favorecido: "Lidia Araujo Rodrigues",
};

const c = {
  accent: "#e8a8c0",
  accentStrong: "#d4729a",
  accentSoft: "#f4d4e2",
  green: "#34c759",
  red: "#ff453a",
  yellow: "#ffd60a",
};

function App() {
  const [tab, setTab] = useState("dashboard");
  const [data, setData] = useState({ transactions: [], products: [], budgets: [], clients: [], catalog: [] });
  const [loaded, setLoaded] = useState(false);
  const [toast, setToast] = useState(null);
  const [companyInfo, setCompanyInfo] = useState(COMPANY);

  useEffect(() => {
    (async () => {
      try {
        const [txRes, prRes, buRes, clRes, catRes] = await Promise.all([
          supabase.from("transactions").select("*").order("order_number", { ascending: false }),
          supabase.from("products").select("*").order("id", { ascending: false }),
          supabase.from("budgets").select("*").order("date", { ascending: false }),
          supabase.from("clients").select("*").order("name", { ascending: true }),
          supabase.from("catalog").select("*").order("name", { ascending: true }),
        ]);
        setData({
          transactions: txRes.data || [],
          products: prRes.data || [],
          budgets: buRes.data || [],
          clients: clRes.data || [],
          catalog: catRes.data || [],
        });
      } catch (e) {
        console.error("Erro ao carregar dados:", e);
      }
      setLoaded(true);
    })();
  }, []);

  function showToast(msg, type = "success") {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2800);
  }

  function nextOrderNumber() {
    const max = data.transactions.reduce((m, t) => Math.max(m, t.order_number || 0), 0);
    return max + 1;
  }

  // ─── CLIENTES: criação automática a partir do nome digitado em Lançamento ───
  async function ensureClient(name) {
    if (!name || !name.trim()) return null;
    const trimmed = name.trim();
    const existing = data.clients.find(cl => cl.name.toLowerCase() === trimmed.toLowerCase());
    if (existing) return existing;
    const { data: inserted, error } = await supabase.from("clients").insert([{ name: trimmed, contact: "", tier: null, segment: null }]).select();
    if (error) { console.error(error); return null; }
    setData(d => ({ ...d, clients: [...d.clients, inserted[0]].sort((a, b) => a.name.localeCompare(b.name)) }));
    return inserted[0];
  }

  async function addTransaction(form) {
    await ensureClient(form.client);
    const row = {
      type: form.type,
      description: form.description,
      amount: parseFloat(form.amount),
      category: form.category,
      date: form.date,
      order_number: nextOrderNumber(),
      client: form.client || null,
      payment_method: form.payment_method || null,
      observation: form.observation || null,
      delivery_date: form.delivery_date || null,
    };
    const { data: inserted, error } = await supabase.from("transactions").insert([row]).select();
    if (error) { showToast("Erro ao salvar lançamento", "error"); console.error(error); return false; }
    setData(d => ({ ...d, transactions: [inserted[0], ...d.transactions] }));
    showToast("Lançamento adicionado!");
    return true;
  }

  async function removeTransaction(id) {
    const { error } = await supabase.from("transactions").delete().eq("id", id);
    if (error) { showToast("Erro ao remover", "error"); return; }
    setData(d => ({ ...d, transactions: d.transactions.filter(t => t.id !== id) }));
    showToast("Removido.");
  }

  async function addProduct(form) {
    const row = { name: form.name, category: form.category, cost: parseFloat(form.cost), price: parseFloat(form.price) };
    const { data: inserted, error } = await supabase.from("products").insert([row]).select();
    if (error) { showToast("Erro ao salvar produto", "error"); return false; }
    setData(d => ({ ...d, products: [inserted[0], ...d.products] }));
    showToast("Produto adicionado!");
    return true;
  }

  async function removeProduct(id) {
    const { error } = await supabase.from("products").delete().eq("id", id);
    if (error) { showToast("Erro ao remover", "error"); return; }
    setData(d => ({ ...d, products: d.products.filter(p => p.id !== id) }));
    showToast("Removido.");
  }

  async function addBudget(form) {
    const row = { client: form.client, event: form.event, items: form.items, total: parseFloat(form.total), date: form.date, status: "pendente" };
    const { data: inserted, error } = await supabase.from("budgets").insert([row]).select();
    if (error) { showToast("Erro ao salvar orçamento", "error"); return false; }
    setData(d => ({ ...d, budgets: [inserted[0], ...d.budgets] }));
    showToast("Orçamento adicionado!");
    return true;
  }

  async function updateBudgetStatus(id, status) {
    const { error } = await supabase.from("budgets").update({ status }).eq("id", id);
    if (error) { showToast("Erro ao atualizar status", "error"); return; }
    setData(d => ({ ...d, budgets: d.budgets.map(b => b.id === id ? { ...b, status } : b) }));
  }

  async function removeBudget(id) {
    const { error } = await supabase.from("budgets").delete().eq("id", id);
    if (error) { showToast("Erro ao remover", "error"); return; }
    setData(d => ({ ...d, budgets: d.budgets.filter(b => b.id !== id) }));
    showToast("Removido.");
  }

  // ─── CLIENTES (CRUD completo) ───
  async function addClient(form) {
    const row = { name: form.name, contact: form.contact || "", tier: form.tier || null, segment: form.segment || null };
    const { data: inserted, error } = await supabase.from("clients").insert([row]).select();
    if (error) { showToast("Erro ao salvar cliente", "error"); return false; }
    setData(d => ({ ...d, clients: [...d.clients, inserted[0]].sort((a, b) => a.name.localeCompare(b.name)) }));
    showToast("Cliente adicionado!");
    return true;
  }

  async function updateClient(id, form) {
    const row = { name: form.name, contact: form.contact || "", tier: form.tier || null, segment: form.segment || null };
    const { error } = await supabase.from("clients").update(row).eq("id", id);
    if (error) { showToast("Erro ao atualizar cliente", "error"); return false; }
    setData(d => ({ ...d, clients: d.clients.map(cl => cl.id === id ? { ...cl, ...row } : cl).sort((a, b) => a.name.localeCompare(b.name)) }));
    showToast("Cliente atualizado!");
    return true;
  }

  async function removeClient(id) {
    const { error } = await supabase.from("clients").delete().eq("id", id);
    if (error) { showToast("Erro ao remover", "error"); return; }
    setData(d => ({ ...d, clients: d.clients.filter(cl => cl.id !== id) }));
    showToast("Removido.");
  }

  // ─── CATÁLOGO DE PRODUTOS (CRUD simples) ───
  async function addCatalogItem(form) {
    const row = { name: form.name, category: form.category };
    const { data: inserted, error } = await supabase.from("catalog").insert([row]).select();
    if (error) { showToast("Erro ao salvar produto", "error"); return false; }
    setData(d => ({ ...d, catalog: [...d.catalog, inserted[0]].sort((a, b) => a.name.localeCompare(b.name)) }));
    showToast("Produto cadastrado!");
    return true;
  }

  async function updateCatalogItem(id, form) {
    const row = { name: form.name, category: form.category };
    const { error } = await supabase.from("catalog").update(row).eq("id", id);
    if (error) { showToast("Erro ao atualizar", "error"); return false; }
    setData(d => ({ ...d, catalog: d.catalog.map(it => it.id === id ? { ...it, ...row } : it).sort((a, b) => a.name.localeCompare(b.name)) }));
    showToast("Produto atualizado!");
    return true;
  }

  async function removeCatalogItem(id) {
    const { error } = await supabase.from("catalog").delete().eq("id", id);
    if (error) { showToast("Erro ao remover", "error"); return; }
    setData(d => ({ ...d, catalog: d.catalog.filter(it => it.id !== id) }));
    showToast("Removido.");
  }

  if (!loaded) return (
    <div style={S.loading}>
      <div style={S.spinner} />
      <p style={{ color: "var(--text-secondary)", marginTop: 16, fontSize: 15 }}>Carregando...</p>
    </div>
  );

  return (
    <div style={S.root}>
      <header style={S.header}>
        <div style={S.headerInner}>
          <div>
            <div className="logo-title" style={S.logo}>Financeiro</div>
            <div className="logo-sub" style={S.logoSub}>Loja de Personalizados</div>
          </div>
        </div>
        <nav style={S.nav}>
          {[
            { id: "dashboard", label: "Resumo" },
            { id: "transactions", label: "Lançamentos" },
            { id: "products", label: "Produtos" },
            { id: "catalog", label: "Catálogo" },
            { id: "budgets", label: "Orçamentos" },
            { id: "clients", label: "Clientes" },
          ].map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={"nav-btn-block" + (tab === t.id ? " nav-active" : "")} style={{ ...S.navBtn, ...(tab === t.id ? S.navBtnActive : {}) }}>
              {t.label}
            </button>
          ))}
        </nav>
      </header>

      <main style={S.main}>
        {tab === "dashboard" && <Dashboard data={data} />}
        {tab === "transactions" && <Transactions data={data} addTransaction={addTransaction} removeTransaction={removeTransaction} showToast={showToast} companyInfo={companyInfo} setCompanyInfo={setCompanyInfo} />}
        {tab === "products" && <Products data={data} addProduct={addProduct} removeProduct={removeProduct} showToast={showToast} />}
        {tab === "catalog" && <Catalog data={data} addCatalogItem={addCatalogItem} updateCatalogItem={updateCatalogItem} removeCatalogItem={removeCatalogItem} showToast={showToast} />}
        {tab === "budgets" && <Budgets data={data} addBudget={addBudget} updateBudgetStatus={updateBudgetStatus} removeBudget={removeBudget} showToast={showToast} />}
        {tab === "clients" && <Clients data={data} addClient={addClient} updateClient={updateClient} removeClient={removeClient} showToast={showToast} />}
      </main>

      {toast && (
        <div style={{ ...S.toast, borderLeft: `3px solid ${toast.type === "success" ? c.accentStrong : c.red}` }}>
          {toast.type === "success" ? "✓" : "✕"} {toast.msg}
        </div>
      )}
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({ data }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const [showExport, setShowExport] = useState(false);

  function prevMonth() {
    if (month === 0) { setMonth(11); setYear(y => y - 1); }
    else setMonth(m => m - 1);
  }
  function nextMonth() {
    if (year === now.getFullYear() && month >= now.getMonth()) return;
    if (month === 11) { setMonth(0); setYear(y => y + 1); }
    else setMonth(m => m + 1);
  }

  const monthStr = `${year}-${String(month + 1).padStart(2, "0")}`;
  const monthly = data.transactions.filter(t => t.date?.startsWith(monthStr));
  const totalIn = monthly.filter(t => t.type === "entrada").reduce((s, t) => s + Number(t.amount), 0);
  const totalOut = monthly.filter(t => t.type === "saida").reduce((s, t) => s + Number(t.amount), 0);
  const profit = totalIn - totalOut;

  const byCategory = {};
  monthly.filter(t => t.type === "entrada").forEach(t => {
    byCategory[t.category] = (byCategory[t.category] || 0) + Number(t.amount);
  });
  const topCats = Object.entries(byCategory).sort((a, b) => b[1] - a[1]).slice(0, 4);
  const recent = [...data.transactions].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
  const monthLabel = new Date(year, month).toLocaleString("pt-BR", { month: "long", year: "numeric" });
  const isCurrentMonth = year === now.getFullYear() && month === now.getMonth();

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
        <button onClick={prevMonth} style={S.monthBtn}>‹</button>
        <h2 className="section-title" style={{ ...S.sectionTitle, marginBottom: 0, flex: 1, textAlign: "center", fontSize: 17 }}>
          {monthLabel}
        </h2>
        <button onClick={nextMonth} style={{ ...S.monthBtn, opacity: isCurrentMonth ? 0.3 : 1 }} disabled={isCurrentMonth}>›</button>
      </div>

      <div className="grid-kpi" style={S.kpiGrid}>
        <KPI label="Entradas" value={totalIn} color={c.green} icon="↑" />
        <KPI label="Saídas" value={totalOut} color={c.red} icon="↓" />
        <KPI label="Lucro" value={profit} color={c.accentStrong} icon="◈" />
      </div>

      <button style={{ ...S.btnPrimary, marginBottom: 20 }} onClick={() => setShowExport(true)}>
        Exportar Lançamentos (PDF)
      </button>

      <div className="grid-2col" style={S.twoCol}>
        <div style={S.card}>
          <div style={S.cardTitle}>Mais Vendidos (este mês)</div>
          {topCats.length === 0 ? (
            <p style={S.empty}>Nenhuma entrada registrada ainda.</p>
          ) : topCats.map(([cat, val]) => (
            <div key={cat} style={S.barRow}>
              <span style={S.barLabel}>{cat}</span>
              <div style={S.barTrack}>
                <div style={{ ...S.barFill, width: `${Math.min(100, (val / totalIn) * 100)}%` }} />
              </div>
              <span style={S.barValue}>{fmt(val)}</span>
            </div>
          ))}
        </div>
        <div style={S.card}>
          <div style={S.cardTitle}>Últimas Transações</div>
          {recent.length === 0 ? (
            <p style={S.empty}>Nenhuma transação ainda.</p>
          ) : recent.map(t => (
            <div key={t.id} style={S.txRow}>
              <div>
                <div style={S.txDesc}>{t.description}</div>
                <div style={S.txMeta}>{t.category} · {t.date}</div>
              </div>
              <div style={{ ...S.txAmount, color: t.type === "entrada" ? c.green : c.red }}>
                {t.type === "entrada" ? "+" : "-"}{fmt(t.amount)}
              </div>
            </div>
          ))}
        </div>
      </div>

      {showExport && <ExportModal transactions={data.transactions} onClose={() => setShowExport(false)} />}
    </div>
  );
}

function KPI({ label, value, color, icon }) {
  return (
    <div style={S.kpiCard}>
      <div style={{ ...S.kpiIcon, color }}>{icon}</div>
      <div className="kpi-value" style={{ ...S.kpiValue, color }}>{fmt(value)}</div>
      <div className="kpi-label" style={S.kpiLabel}>{label}</div>
    </div>
  );
}

// ─── MODAL DE EXPORTAÇÃO POR PERÍODO ──────────────────────────────────────────
function ExportModal({ transactions, onClose }) {
  const [start, setStart] = useState(today());
  const [end, setEnd] = useState(today());
  const [filterType, setFilterType] = useState("todos");

  function generate() {
    const filtered = transactions.filter(t => {
      if (!t.date) return false;
      if (t.date < start || t.date > end) return false;
      if (filterType !== "todos" && t.type !== filterType) return false;
      return true;
    }).sort((a, b) => new Date(a.date) - new Date(b.date));

    if (filtered.length === 0) {
      alert("Nenhum lançamento encontrado nesse período.");
      return;
    }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "a4" });
    const pink = [212, 114, 154];
    const dark = [40, 30, 36];
    const gray = [120, 120, 128];
    const pageW = doc.internal.pageSize.getWidth();
    let y = 50;

    doc.setFillColor(...pink);
    doc.rect(0, 0, pageW, 8, "F");

    doc.setFont("helvetica", "bold");
    doc.setFontSize(18);
    doc.setTextColor(...dark);
    doc.text(COMPANY.name, 40, y);
    y += 18;
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.setTextColor(...gray);
    doc.text(COMPANY.tagline, 40, y);
    y += 30;

    doc.setDrawColor(...pink);
    doc.setLineWidth(1.2);
    doc.line(40, y, pageW - 40, y);
    y += 26;

    doc.setFont("helvetica", "bold");
    doc.setFontSize(14);
    doc.setTextColor(...dark);
    doc.text("Extrato de Lançamentos", 40, y);
    y += 18;
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.setTextColor(...gray);
    const tipoLabel = filterType === "todos" ? "Entradas e Saídas" : filterType === "entrada" ? "Entradas" : "Saídas";
    doc.text(`Período: ${fmtDate(start)} a ${fmtDate(end)}  ·  ${tipoLabel}`, 40, y);
    y += 26;

    // Cabeçalho da tabela
    doc.setFillColor(248, 230, 238);
    doc.rect(40, y, pageW - 80, 22, "F");
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9);
    doc.setTextColor(...dark);
    doc.text("Data", 46, y + 15);
    doc.text("Descrição", 110, y + 15);
    doc.text("Categoria", 300, y + 15);
    doc.text("Tipo", 410, y + 15);
    doc.text("Valor", pageW - 50, y + 15, { align: "right" });
    y += 22;

    doc.setFont("helvetica", "normal");
    doc.setFontSize(9);
    let totalIn = 0, totalOut = 0;

    filtered.forEach((t, i) => {
      if (y > 760) { doc.addPage(); y = 50; }
      if (i % 2 === 0) {
        doc.setFillColor(252, 244, 248);
        doc.rect(40, y, pageW - 80, 20, "F");
      }
      doc.setTextColor(...dark);
      doc.text(fmtDate(t.date), 46, y + 14);
      doc.text(truncate(t.description || "", 38), 110, y + 14);
      doc.text(truncate(t.category || "", 20), 300, y + 14);
      doc.setTextColor(...(t.type === "entrada" ? [52, 199, 89] : [255, 69, 58]));
      doc.text(t.type === "entrada" ? "Entrada" : "Saída", 410, y + 14);
      doc.text((t.type === "entrada" ? "+" : "-") + fmt(t.amount), pageW - 50, y + 14, { align: "right" });
      if (t.type === "entrada") totalIn += Number(t.amount); else totalOut += Number(t.amount);
      y += 20;
    });

    y += 14;
    doc.setDrawColor(...pink);
    doc.line(40, y, pageW - 40, y);
    y += 20;

    doc.setFont("helvetica", "bold");
    doc.setFontSize(10);
    doc.setTextColor(...dark);
    doc.text(`Total de Entradas: ${fmt(totalIn)}`, 40, y);
    y += 16;
    doc.text(`Total de Saídas: ${fmt(totalOut)}`, 40, y);
    y += 16;
    doc.setTextColor(...pink);
    doc.text(`Saldo do Período: ${fmt(totalIn - totalOut)}`, 40, y);

    doc.setFont("helvetica", "normal");
    doc.setFontSize(8);
    doc.setTextColor(...gray);
    doc.text(`${COMPANY.address}  ·  ${COMPANY.phone}`, 40, 800);

    doc.save(`extrato_${start}_a_${end}.pdf`);
    onClose();
  }

  return (
    <div style={S.modalOverlay} onClick={onClose}>
      <div className="modal-card" style={S.modalCard} onClick={e => e.stopPropagation()}>
        <div style={S.cardTitle}>Exportar Lançamentos</div>
        <div className="grid-form" style={S.formGrid}>
          <div>
            <label style={S.label}>De</label>
            <input className="app-input" style={S.input} type="date" value={start} onChange={e => setStart(e.target.value)} />
          </div>
          <div>
            <label style={S.label}>Até</label>
            <input className="app-input" style={S.input} type="date" value={end} onChange={e => setEnd(e.target.value)} />
          </div>
          <div style={{ gridColumn: "1 / -1" }}>
            <label style={S.label}>Tipo</label>
            <select className="app-input" style={S.input} value={filterType} onChange={e => setFilterType(e.target.value)}>
              <option value="todos">Entradas e Saídas</option>
              <option value="entrada">Apenas Entradas</option>
              <option value="saida">Apenas Saídas</option>
            </select>
          </div>
          <button className="btn-primary" style={S.btnPrimary} onClick={generate}>Gerar PDF</button>
          <button style={S.btnSecondary} onClick={onClose}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

// ─── TRANSACTIONS ─────────────────────────────────────────────────────────────
function Transactions({ data, addTransaction, removeTransaction, showToast, companyInfo, setCompanyInfo }) {
  const [form, setForm] = useState({
    type: "entrada", description: "", amount: "", category: categories[0], date: today(),
    client: "", payment_method: paymentMethods[0], observation: "", delivery_date: "",
  });
  const [filter, setFilter] = useState("todos");
  const [saving, setSaving] = useState(false);
  const [showBankEdit, setShowBankEdit] = useState(false);
  const [pdfTarget, setPdfTarget] = useState(null);

  async function add() {
    if (!form.description || !form.amount) return showToast("Preencha descrição e valor", "error");
    setSaving(true);
    await addTransaction(form);
    setForm(f => ({ ...f, description: "", amount: "", client: "", observation: "", delivery_date: "" }));
    setSaving(false);
  }

  const filtered = filter === "todos" ? data.transactions : data.transactions.filter(t => t.type === filter);
  const sorted = [...filtered].sort((a, b) => (b.order_number || 0) - (a.order_number || 0));
  const clientNames = data.clients.map(cl => cl.name);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h2 className="section-title" style={{ ...S.sectionTitle, marginBottom: 0 }}>Lançamentos</h2>
        <button style={S.linkBtn} onClick={() => setShowBankEdit(true)}>Dados bancários</button>
      </div>

      <div style={S.card}>
        <div style={S.cardTitle}>Novo Lançamento</div>
        <div className="grid-form" style={S.formGrid}>
          <div style={S.typeToggle}>
            {["entrada", "saida"].map(t => (
              <button key={t} onClick={() => setForm(f => ({ ...f, type: t }))}
                style={{ ...S.typeBtn, ...(form.type === t ? (t === "entrada" ? S.typeBtnEntrada : S.typeBtnSaida) : {}) }}>
                {t === "entrada" ? "↑ Entrada" : "↓ Saída"}
              </button>
            ))}
          </div>

          <input className="app-input" style={S.input} placeholder="Descrição" value={form.description} onChange={e => setForm(f => ({ ...f, description: e.target.value }))} />
          <input className="app-input" style={S.input} placeholder="Valor (R$)" type="number" value={form.amount} onChange={e => setForm(f => ({ ...f, amount: e.target.value }))} />

          <select className="app-input" style={S.input} value={form.category} onChange={e => setForm(f => ({ ...f, category: e.target.value }))}>
            {categories.map(cat => <option key={cat}>{cat}</option>)}
          </select>
          <input className="app-input" style={S.input} type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} />

          <input className="app-input" style={S.input} list="client-list" placeholder="Cliente" value={form.client} onChange={e => setForm(f => ({ ...f, client: e.target.value }))} />
          <datalist id="client-list">
            {clientNames.map(n => <option key={n} value={n} />)}
          </datalist>

          <select className="app-input" style={S.input} value={form.payment_method} onChange={e => setForm(f => ({ ...f, payment_method: e.target.value }))}>
            {paymentMethods.map(p => <option key={p}>{p}</option>)}
          </select>

          <input className="app-input" style={S.input} type="date" placeholder="Prazo de entrega" value={form.delivery_date} onChange={e => setForm(f => ({ ...f, delivery_date: e.target.value }))} />
          <div />

          <textarea style={{ ...S.input, gridColumn: "1 / -1", minHeight: 60, resize: "vertical" }} placeholder="Observação (opcional)" value={form.observation} onChange={e => setForm(f => ({ ...f, observation: e.target.value }))} />

          <button className="btn-primary" style={{ ...S.btnPrimary, opacity: saving ? 0.6 : 1 }} onClick={add} disabled={saving}>
            {saving ? "Salvando..." : "Adicionar"}
          </button>
        </div>
      </div>

      <div style={{ display: "flex", gap: 8, margin: "20px 0 12px" }}>
        {["todos", "entrada", "saida"].map(f => (
          <button key={f} onClick={() => setFilter(f)}
            style={{ ...S.filterBtn, ...(filter === f ? S.filterBtnActive : {}) }}>
            {f === "todos" ? "Todos" : f === "entrada" ? "↑ Entradas" : "↓ Saídas"}
          </button>
        ))}
      </div>

      {sorted.length === 0 ? <p style={S.empty}>Nenhum lançamento ainda.</p> : sorted.map(t => (
        <div key={t.id} className="tx-card-inner" style={{ ...S.txCard, borderLeft: `3px solid ${t.type === "entrada" ? c.green : c.red}`, flexWrap: "wrap" }}>
          <div className="order-badge" style={S.orderBadge}># {String(t.order_number || 0).padStart(4, "0")}</div>
          <div style={{ flex: 1, minWidth: 140 }}>
            <div style={S.txDesc}>{t.description}</div>
            <div style={S.txMeta}>{t.category} · {t.date}{t.client ? ` · ${t.client}` : ""}</div>
          </div>
          <div style={{ ...S.txAmount, color: t.type === "entrada" ? c.green : c.red }}>
            {t.type === "entrada" ? "+" : "-"}{fmt(t.amount)}
          </div>
          <button onClick={() => setPdfTarget(t)} style={S.btnPdf}>Gerar PDF</button>
          <button onClick={() => removeTransaction(t.id)} style={S.btnRemove}>✕</button>
        </div>
      ))}

      {showBankEdit && <BankInfoModal companyInfo={companyInfo} setCompanyInfo={setCompanyInfo} onClose={() => setShowBankEdit(false)} />}
      {pdfTarget && <OrderPdfModal transaction={pdfTarget} clients={data.clients} companyInfo={companyInfo} onClose={() => setPdfTarget(null)} />}
    </div>
  );
}

// ─── MODAL DE GERAÇÃO DE PDF DO PEDIDO ────────────────────────────────────────
function OrderPdfModal({ transaction, clients, companyInfo, onClose }) {
  const t = transaction;
  const client = clients.find(cl => cl.name === t.client);

  function generate() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "a4" });
    const pink = [212, 114, 154];
    const pinkLight = [248, 230, 238];
    const dark = [40, 30, 36];
    const gray = [120, 120, 128];
    const pageW = doc.internal.pageSize.getWidth();
    let y = 0;

    // Faixa superior
    doc.setFillColor(...pink);
    doc.rect(0, 0, pageW, 10, "F");
    y = 46;

    doc.setFont("helvetica", "bold");
    doc.setFontSize(20);
    doc.setTextColor(...dark);
    doc.text(companyInfo.name, 40, y);
    y += 16;
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.setTextColor(...gray);
    doc.text(companyInfo.tagline, 40, y);

    doc.setFont("helvetica", "bold");
    doc.setFontSize(13);
    doc.setTextColor(...pink);
    doc.text(`Pedido Nº ${String(t.order_number || 0).padStart(4, "0")}`, pageW - 40, 46, { align: "right" });

    y += 24;
    doc.setDrawColor(...pink);
    doc.setLineWidth(1.2);
    doc.line(40, y, pageW - 40, y);
    y += 28;

    doc.setFont("helvetica", "bold");
    doc.setFontSize(11);
    doc.setTextColor(...dark);
    doc.text("ORDEM DE PEDIDO", 40, y);
    y += 26;

    // Dados do cliente
    doc.setFillColor(...pinkLight);
    doc.roundedRect(40, y, pageW - 80, 56, 8, 8, "F");
    doc.setFont("helvetica", "bold");
    doc.setFontSize(10);
    doc.setTextColor(...dark);
    doc.text("Cliente:", 52, y + 20);
    doc.setFont("helvetica", "normal");
    doc.text(t.client || "-", 110, y + 20);
    doc.setFont("helvetica", "bold");
    doc.text("Contato:", 52, y + 40);
    doc.setFont("helvetica", "normal");
    doc.text((client && client.contact) || "-", 110, y + 40);
    y += 76;

    // Tabela de descrição do pedido
    doc.setFillColor(...pinkLight);
    doc.rect(40, y, pageW - 80, 22, "F");
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9);
    doc.text("Descrição do Pedido", 50, y + 15);
    doc.text("Valor", pageW - 50, y + 15, { align: "right" });
    y += 22;

    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    const descLines = doc.splitTextToSize(t.description || "-", pageW - 180);
    doc.text(descLines, 50, y + 16);
    doc.setFont("helvetica", "bold");
    doc.setTextColor(...pink);
    doc.text(fmt(t.amount), pageW - 50, y + 16, { align: "right" });
    y += Math.max(24, descLines.length * 13 + 10);

    doc.setDrawColor(220, 220, 220);
    doc.setLineWidth(0.5);
    doc.line(40, y, pageW - 40, y);
    y += 20;

    // Categoria / Prazo / Pagamento
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9);
    doc.setTextColor(...gray);
    doc.text("Categoria", 40, y);
    doc.text("Prazo de Entrega", 220, y);
    doc.text("Forma de Pagamento", 400, y);
    y += 14;
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.setTextColor(...dark);
    doc.text(t.category || "-", 40, y);
    doc.text(t.delivery_date ? fmtDate(t.delivery_date) : "-", 220, y);
    doc.text(t.payment_method || "-", 400, y);
    y += 26;

    if (t.observation) {
      doc.setFont("helvetica", "bold");
      doc.setFontSize(9);
      doc.setTextColor(...gray);
      doc.text("Observação", 40, y);
      y += 14;
      doc.setFont("helvetica", "normal");
      doc.setFontSize(10);
      doc.setTextColor(...dark);
      const obsLines = doc.splitTextToSize(t.observation, pageW - 80);
      doc.text(obsLines, 40, y);
      y += obsLines.length * 13 + 14;
    }

    y += 10;
    doc.setDrawColor(...pink);
    doc.line(40, y, pageW - 40, y);
    y += 24;

    // Dados bancários
    doc.setFont("helvetica", "bold");
    doc.setFontSize(10);
    doc.setTextColor(...dark);
    doc.text("Forma de Pagamento / Dados Bancários", 40, y);
    y += 16;
    doc.setFont("helvetica", "normal");
    doc.setFontSize(9.5);
    doc.text(`Chave PIX: ${companyInfo.pixKey}`, 40, y); y += 14;
    doc.text(`Banco: ${companyInfo.bank}`, 40, y); y += 14;
    doc.text(`Favorecido: ${companyInfo.favorecido}`, 40, y); y += 26;

    // Assinatura / data
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    const todayLabel = new Date().toLocaleDateString("pt-BR", { day: "2-digit", month: "long", year: "numeric" });
    doc.text(todayLabel, pageW / 2, y, { align: "center" });
    y += 16;
    doc.setFont("helvetica", "italic");
    doc.text(companyInfo.favorecido, pageW / 2, y, { align: "center" });

    // Rodapé
    doc.setFont("helvetica", "normal");
    doc.setFontSize(8.5);
    doc.setTextColor(...gray);
    doc.text(`${companyInfo.address}`, pageW / 2, 780, { align: "center" });
    doc.text(`Telefone/WhatsApp: ${companyInfo.phone}`, pageW / 2, 793, { align: "center" });

    doc.save(`pedido_${String(t.order_number || 0).padStart(4, "0")}.pdf`);
    onClose();
  }

  return (
    <div style={S.modalOverlay} onClick={onClose}>
      <div className="modal-card" style={S.modalCard} onClick={e => e.stopPropagation()}>
        <div style={S.cardTitle}>Gerar Ordem de Pedido</div>
        <p style={{ fontSize: 14, color: "var(--text-secondary)", marginBottom: 16 }}>
          Pedido Nº {String(t.order_number || 0).padStart(4, "0")} — {t.client || "Sem cliente"}
        </p>
        <div className="grid-form" style={S.formGrid}>
          <button className="btn-primary" style={S.btnPrimary} onClick={generate}>Gerar e Baixar PDF</button>
          <button style={S.btnSecondary} onClick={onClose}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

  return (

      {data.products.length === 0 ? <p style={S.empty}>Nenhum produto cadastrado ainda.</p> : (

            const lucro = Number(p.price) - Number(p.cost);
            const margem = ((lucro / Number(p.price)) * 100).toFixed(1);

              <div key={p.id} style={S.productCard}>
                <div style={S.productName}>{p.name}</div>
                <div style={S.productCat}>{p.category}</div>

                <div style={S.productRow}><span>Venda</span><span style={{ color: c.green }}>{fmt(p.price)}</span></div>
                <div style={{ ...S.productRow, fontWeight: 600, borderTop: "1px solid var(--separator)", paddingTop: 8, marginTop: 4 }}>
                  <span>Lucro</span>
                  <span style={{ color: lucro >= 0 ? c.accentStrong : c.red }}>{fmt(lucro)}</span>
                </div>
                <div style={S.margemBar}>
                  <div style={{ ...S.margemFill, width: `${Math.min(100, Math.max(0, parseFloat(margem)))}%` }} />
                </div>
                <div style={{ textAlign: "right", fontSize: 12, color: c.accentStrong, marginTop: 4 }}>Margem: {margem}%</div>
                <button onClick={() => removeProduct(p.id)} style={{ ...S.btnRemove, marginTop: 12, width: "100%" }}>✕ Remover</button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── CATÁLOGO DE PRODUTOS (cadastro simples) ──────────────────────────────────
function Catalog({ data, addCatalogItem, updateCatalogItem, removeCatalogItem, showToast }) {
  const [form, setForm] = useState({ name: "", category: categories[0] });
  const [editingId, setEditingId] = useState(null);
  const [editForm, setEditForm] = useState({ name: "", category: categories[0] });
  const [filterCat, setFilterCat] = useState("todas");
  const [saving, setSaving] = useState(false);

  async function add() {
    if (!form.name) return showToast("Preencha o nome do produto", "error");
    setSaving(true);
    await addCatalogItem(form);
    setForm(f => ({ ...f, name: "" }));
    setSaving(false);
  }

  function startEdit(item) {
    setEditingId(item.id);
    setEditForm({ name: item.name, category: item.category });
  }

  async function saveEdit() {
    await updateCatalogItem(editingId, editForm);
    setEditingId(null);
  }

  const filtered = filterCat === "todas" ? data.catalog : data.catalog.filter(it => it.category === filterCat);

  return (
    <div>
      <h2 className="section-title" style={S.sectionTitle}>Catálogo de Produtos</h2>
      <div style={S.card}>
        <div style={S.cardTitle}>Novo Produto no Catálogo</div>
        <div className="grid-form" style={S.formGrid}>
          <input className="app-input" style={S.input} placeholder="Nome do produto" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} />
          <select className="app-input" style={S.input} value={form.category} onChange={e => setForm(f => ({ ...f, category: e.target.value }))}>
            {categories.map(cat => <option key={cat}>{cat}</option>)}
          </select>
          <button style={{ ...S.btnPrimary, opacity: saving ? 0.6 : 1, gridColumn: "1 / -1" }} onClick={add} disabled={saving}>
            {saving ? "Salvando..." : "Adicionar ao Catálogo"}
          </button>
        </div>
      </div>

      <div style={{ display: "flex", gap: 8, margin: "20px 0 12px", flexWrap: "wrap" }}>
        <button onClick={() => setFilterCat("todas")} style={{ ...S.filterBtn, ...(filterCat === "todas" ? S.filterBtnActive : {}) }}>Todas</button>
        {categories.map(cat => (
          <button key={cat} onClick={() => setFilterCat(cat)} style={{ ...S.filterBtn, ...(filterCat === cat ? S.filterBtnActive : {}) }}>{cat}</button>
        ))}
      </div>

      {filtered.length === 0 ? <p style={S.empty}>Nenhum produto no catálogo ainda.</p> : filtered.map(item => (
        <div key={item.id} style={S.txCard}>
          {editingId === item.id ? (
            <div style={{ display: "flex", gap: 10, flex: 1, flexWrap: "wrap" }}>
              <input style={{ ...S.input, flex: 1, minWidth: 140 }} value={editForm.name} onChange={e => setEditForm(f => ({ ...f, name: e.target.value }))} />
              <select style={{ ...S.input, flex: 1, minWidth: 140 }} value={editForm.category} onChange={e => setEditForm(f => ({ ...f, category: e.target.value }))}>
                {categories.map(cat => <option key={cat}>{cat}</option>)}
              </select>
              <button className="btn-primary" style={S.btnPrimary} onClick={saveEdit}>Salvar</button>
              <button style={S.btnSecondary} onClick={() => setEditingId(null)}>Cancelar</button>
            </div>
          ) : (
            <React.Fragment>
              <div style={{ flex: 1 }}>
                <div style={S.txDesc}>{item.name}</div>
                <div style={S.txMeta}>{item.category}</div>
              </div>
              <button style={S.btnSecondary} onClick={() => startEdit(item)}>Editar</button>
              <button onClick={() => removeCatalogItem(item.id)} style={S.btnRemove}>✕</button>
            </React.Fragment>
          )}
        </div>
      ))}
    </div>
  );
}

// ─── BUDGETS ──────────────────────────────────────────────────────────────────
function Budgets({ data, addBudget, updateBudgetStatus, removeBudget, showToast }) {
  const [form, setForm] = useState({ client: "", event: "", items: "", total: "", date: today() });
  const [saving, setSaving] = useState(false);

  async function add() {
    if (!form.client || !form.total) return showToast("Preencha cliente e valor", "error");
    setSaving(true);
    await addBudget(form);
    setForm(f => ({ ...f, client: "", event: "", items: "", total: "" }));
    setSaving(false);
  }

  const statusColor = { pendente: c.yellow, aprovado: c.green, recusado: c.red };

  return (
    <div>
      <h2 className="section-title" style={S.sectionTitle}>Orçamentos de Clientes</h2>
      <div style={S.card}>
        <div style={S.cardTitle}>Novo Orçamento</div>
        <div className="grid-form" style={S.formGrid}>
          <input className="app-input" style={S.input} placeholder="Nome do cliente" value={form.client} onChange={e => setForm(f => ({ ...f, client: e.target.value }))} />
          <input className="app-input" style={S.input} placeholder="Evento (ex: Aniversário 30 anos)" value={form.event} onChange={e => setForm(f => ({ ...f, event: e.target.value }))} />
          <input className="app-input" style={S.input} placeholder="Itens (ex: 50 convites, topo de bolo)" value={form.items} onChange={e => setForm(f => ({ ...f, items: e.target.value }))} />
          <input className="app-input" style={S.input} placeholder="Valor total (R$)" type="number" value={form.total} onChange={e => setForm(f => ({ ...f, total: e.target.value }))} />
          <input className="app-input" style={S.input} type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} />
          <button className="btn-primary" style={{ ...S.btnPrimary, opacity: saving ? 0.6 : 1 }} onClick={add} disabled={saving}>
            {saving ? "Salvando..." : "Salvar Orçamento"}
          </button>
        </div>
      </div>
      {data.budgets.length === 0 ? <p style={S.empty}>Nenhum orçamento ainda.</p> : data.budgets.map(b => (
        <div key={b.id} style={{ ...S.txCard, borderLeft: `3px solid ${statusColor[b.status] || c.yellow}` }}>
          <div style={{ flex: 1 }}>
            <div style={S.txDesc}>{b.client} <span style={{ color: c.accentStrong, fontWeight: 400 }}>· {b.event}</span></div>
            <div style={S.txMeta}>{b.items} · {b.date}</div>
            <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
              {["pendente", "aprovado", "recusado"].map(s => (
                <button key={s} onClick={() => updateBudgetStatus(b.id, s)}
                  style={{ ...S.statusBtn, background: b.status === s ? (statusColor[s] + "26") : "transparent", borderColor: statusColor[s], color: b.status === s ? statusColor[s] : "var(--text-tertiary)" }}>
                  {s.charAt(0).toUpperCase() + s.slice(1)}
                </button>
              ))}
            </div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ ...S.txAmount, fontSize: 17, color: c.accentStrong }}>{fmt(b.total)}</div>
            <button onClick={() => removeBudget(b.id)} style={{ ...S.btnRemove, marginTop: 8 }}>✕</button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── CLIENTES ─────────────────────────────────────────────────────────────────
function Clients({ data, addClient, updateClient, removeClient, showToast }) {
  const [form, setForm] = useState({ name: "", contact: "", tier: "", segment: "" });
  const [editingId, setEditingId] = useState(null);
  const [editForm, setEditForm] = useState({ name: "", contact: "", tier: "", segment: "" });
  const [filterTier, setFilterTier] = useState("todos");
  const [filterSegment, setFilterSegment] = useState("todos");
  const [saving, setSaving] = useState(false);

  async function add() {
    if (!form.name) return showToast("Preencha o nome do cliente", "error");
    setSaving(true);
    await addClient(form);
    setForm({ name: "", contact: "", tier: "", segment: "" });
    setSaving(false);
  }

  function startEdit(cl) {
    setEditingId(cl.id);
    setEditForm({ name: cl.name, contact: cl.contact || "", tier: cl.tier || "", segment: cl.segment || "" });
  }

  async function saveEdit() {
    await updateClient(editingId, editForm);
    setEditingId(null);
  }

  const filtered = data.clients.filter(cl => {
    if (filterTier !== "todos" && cl.tier !== filterTier) return false;
    if (filterSegment !== "todos" && cl.segment !== filterSegment) return false;
    return true;
  });

  function tierInfo(tierId) {
    return clientTiers.find(t => t.id === tierId);
  }

  return (
    <div>
      <h2 className="section-title" style={S.sectionTitle}>Clientes</h2>
      <div style={S.card}>
        <div style={S.cardTitle}>Novo Cliente</div>
        <div className="grid-form" style={S.formGrid}>
          <input className="app-input" style={S.input} placeholder="Nome" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} />
          <input className="app-input" style={S.input} placeholder="Contato (telefone/Instagram)" value={form.contact} onChange={e => setForm(f => ({ ...f, contact: e.target.value }))} />
          <select className="app-input" style={S.input} value={form.tier} onChange={e => setForm(f => ({ ...f, tier: e.target.value }))}>
            <option value="">Categoria (opcional)</option>
            {clientTiers.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
          </select>
          <select className="app-input" style={S.input} value={form.segment} onChange={e => setForm(f => ({ ...f, segment: e.target.value }))}>
            <option value="">Tipo de cliente (opcional)</option>
            {clientSegments.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          <button className="btn-primary" style={{ ...S.btnPrimary, opacity: saving ? 0.6 : 1 }} onClick={add} disabled={saving}>
            {saving ? "Salvando..." : "Adicionar Cliente"}
          </button>
        </div>
      </div>

      <div style={{ display: "flex", gap: 8, margin: "20px 0 12px", flexWrap: "wrap" }}>
        <button onClick={() => setFilterTier("todos")} style={{ ...S.filterBtn, ...(filterTier === "todos" ? S.filterBtnActive : {}) }}>Todas categorias</button>
        {clientTiers.map(t => (
          <button key={t.id} onClick={() => setFilterTier(t.id)}
            style={{ ...S.filterBtn, ...(filterTier === t.id ? { background: t.color + "26", color: t.color, fontWeight: 600 } : {}) }}>
            {t.label}
          </button>
        ))}
      </div>
      <div style={{ display: "flex", gap: 8, margin: "0 0 16px", flexWrap: "wrap" }}>
        <button onClick={() => setFilterSegment("todos")} style={{ ...S.filterBtn, ...(filterSegment === "todos" ? S.filterBtnActive : {}) }}>Todos os tipos</button>
        {clientSegments.map(s => (
          <button key={s} onClick={() => setFilterSegment(s)} style={{ ...S.filterBtn, ...(filterSegment === s ? S.filterBtnActive : {}) }}>{s}</button>
        ))}
      </div>

      {filtered.length === 0 ? <p style={S.empty}>Nenhum cliente encontrado.</p> : filtered.map(cl => {
        const tier = tierInfo(cl.tier);
        return (
          <div key={cl.id} style={{ ...S.txCard, borderLeft: `3px solid ${tier ? tier.color : "var(--separator)"}`, flexWrap: "wrap" }}>
            {editingId === cl.id ? (
              <div style={{ display: "flex", gap: 10, flex: 1, flexWrap: "wrap" }}>
                <input style={{ ...S.input, flex: 1, minWidth: 120 }} value={editForm.name} onChange={e => setEditForm(f => ({ ...f, name: e.target.value }))} />
                <input style={{ ...S.input, flex: 1, minWidth: 120 }} placeholder="Contato" value={editForm.contact} onChange={e => setEditForm(f => ({ ...f, contact: e.target.value }))} />
                <select style={{ ...S.input, flex: 1, minWidth: 120 }} value={editForm.tier} onChange={e => setEditForm(f => ({ ...f, tier: e.target.value }))}>
                  <option value="">Categoria</option>
                  {clientTiers.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
                </select>
                <select style={{ ...S.input, flex: 1, minWidth: 120 }} value={editForm.segment} onChange={e => setEditForm(f => ({ ...f, segment: e.target.value }))}>
                  <option value="">Tipo</option>
                  {clientSegments.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
                <button className="btn-primary" style={S.btnPrimary} onClick={saveEdit}>Salvar</button>
                <button style={S.btnSecondary} onClick={() => setEditingId(null)}>Cancelar</button>
              </div>
            ) : (
              <React.Fragment>
                <div style={{ flex: 1, minWidth: 140 }}>
                  <div style={S.txDesc}>{cl.name}</div>
                  <div style={S.txMeta}>
                    {cl.contact || "Sem contato cadastrado"}
                    {tier ? ` · ${tier.label}` : ""}
                    {cl.segment ? ` · ${cl.segment}` : ""}
                  </div>
                </div>
                <button style={S.btnSecondary} onClick={() => startEdit(cl)}>Editar</button>
                <button onClick={() => removeClient(cl.id)} style={S.btnRemove}>✕</button>
              </React.Fragment>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function fmt(v) {
  return new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(v || 0);
}
function fmtDate(iso) {
  if (!iso) return "-";
  const [y, m, d] = iso.split("-");
  return `${d}/${m}/${y}`;
}
function truncate(str, n) {
  return str.length > n ? str.slice(0, n - 1) + "…" : str;
}
function today() {
  return new Date().toISOString().split("T")[0];
}
