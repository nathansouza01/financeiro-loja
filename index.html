<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financeiro – Loja de Personalizados</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1018; color: #f0e6ee; font-family: 'Georgia', serif; }
    input, select, button { font-family: inherit; }
    input::placeholder { color: #9e7d95; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #ffffff08; }
    ::-webkit-scrollbar-thumb { background: #f4a7c344; border-radius: 10px; }
    option { background: #2a1a26; color: #f0e6ee; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const SUPABASE_URL = "https://guvpqriitqspggznwtkr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1dnBxcmlpdHFzcGdnem53dGtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjE2NjYsImV4cCI6MjA4OTYzNzY2Nn0.X0GVsoMac7dpOVzCZPg6CGklWIbdTB0sD8_tAYSl6FU";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const { useState, useEffect } = React;

const categories = ["Canecas", "Camisetas", "Quadros", "Convites", "Topos de Bolo", "Adesivos", "Cartonagem", "Outros"];

const pink = {
  main: "#f4a7c3",
  light: "#ffd6e7",
  dark: "#d4729a",
  bg: "#1a1018",
  card: "#ffffff07",
  border: "#f4a7c322",
  text: "#f0e6ee",
  muted: "#9e7d95",
  green: "#7ecfa0",
  red: "#f4877a",
};

function App() {
  const [tab, setTab] = useState("dashboard");
  const [data, setData] = useState({ transactions: [], products: [], budgets: [] });
  const [loaded, setLoaded] = useState(false);
  const [toast, setToast] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const [txRes, prRes, buRes] = await Promise.all([
          supabase.from("transactions").select("*").order("date", { ascending: false }),
          supabase.from("products").select("*").order("id", { ascending: false }),
          supabase.from("budgets").select("*").order("date", { ascending: false }),
        ]);
        setData({
          transactions: txRes.data || [],
          products: prRes.data || [],
          budgets: buRes.data || [],
        });
      } catch (e) {
        console.error("Erro ao carregar dados:", e);
      }
      setLoaded(true);
    })();
  }, []);

  function showToast(msg, type = "success") {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2800);
  }

  async function addTransaction(form) {
    const row = { type: form.type, description: form.description, amount: parseFloat(form.amount), category: form.category, date: form.date };
    const { data: inserted, error } = await supabase.from("transactions").insert([row]).select();
    if (error) { showToast("Erro ao salvar lançamento", "error"); return false; }
    setData(d => ({ ...d, transactions: [inserted[0], ...d.transactions] }));
    showToast("Lançamento adicionado!");
    return true;
  }

  async function removeTransaction(id) {
    const { error } = await supabase.from("transactions").delete().eq("id", id);
    if (error) { showToast("Erro ao remover", "error"); return; }
    setData(d => ({ ...d, transactions: d.transactions.filter(t => t.id !== id) }));
    showToast("Removido.");
  }

  async function addProduct(form) {
    const row = { name: form.name, category: form.category, cost: parseFloat(form.cost), price: parseFloat(form.price) };
    const { data: inserted, error } = await supabase.from("products").insert([row]).select();
    if (error) { showToast("Erro ao salvar produto", "error"); return false; }
    setData(d => ({ ...d, products: [inserted[0], ...d.products] }));
    showToast("Produto adicionado!");
    return true;
  }

  async function removeProduct(id) {
    const { error } = await supabase.from("products").delete().eq("id", id);
    if (error) { showToast("Erro ao remover", "error"); return; }
    setData(d => ({ ...d, products: d.products.filter(p => p.id !== id) }));
    showToast("Removido.");
  }

  async function addBudget(form) {
    const row = { client: form.client, event: form.event, items: form.items, total: parseFloat(form.total), date: form.date, status: "pendente" };
    const { data: inserted, error } = await supabase.from("budgets").insert([row]).select();
    if (error) { showToast("Erro ao salvar orçamento", "error"); return false; }
    setData(d => ({ ...d, budgets: [inserted[0], ...d.budgets] }));
    showToast("Orçamento adicionado!");
    return true;
  }

  async function updateBudgetStatus(id, status) {
    const { error } = await supabase.from("budgets").update({ status }).eq("id", id);
    if (error) { showToast("Erro ao atualizar status", "error"); return; }
    setData(d => ({ ...d, budgets: d.budgets.map(b => b.id === id ? { ...b, status } : b) }));
  }

  async function removeBudget(id) {
    const { error } = await supabase.from("budgets").delete().eq("id", id);
    if (error) { showToast("Erro ao remover", "error"); return; }
    setData(d => ({ ...d, budgets: d.budgets.filter(b => b.id !== id) }));
    showToast("Removido.");
  }

  if (!loaded) return (
    <div style={S.loading}>
      <div style={S.spinner} />
      <p style={{ color: pink.main, marginTop: 16 }}>Carregando...</p>
    </div>
  );

  return (
    <div style={S.root}>
      <div style={S.bgDecor1} />
      <div style={S.bgDecor2} />
      <header style={S.header}>
        <div style={S.headerInner}>
          <div>
            <div style={S.logo}>✦ Financeiro</div>
            <div style={S.logoSub}>Loja de Personalizados</div>
          </div>
          <nav style={S.nav}>
            {[
              { id: "dashboard", label: "Resumo", icon: "◈" },
              { id: "transactions", label: "Lançamentos", icon: "⊕" },
              { id: "products", label: "Produtos", icon: "◎" },
              { id: "budgets", label: "Orçamentos", icon: "◇" },
            ].map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                style={{ ...S.navBtn, ...(tab === t.id ? S.navBtnActive : {}) }}>
                <span style={{ marginRight: 5 }}>{t.icon}</span>{t.label}
              </button>
            ))}
          </nav>
        </div>
      </header>

      <main style={S.main}>
        {tab === "dashboard" && <Dashboard data={data} />}
        {tab === "transactions" && <Transactions data={data} addTransaction={addTransaction} removeTransaction={removeTransaction} showToast={showToast} />}
        {tab === "products" && <Products data={data} addProduct={addProduct} removeProduct={removeProduct} showToast={showToast} />}
        {tab === "budgets" && <Budgets data={data} addBudget={addBudget} updateBudgetStatus={updateBudgetStatus} removeBudget={removeBudget} showToast={showToast} />}
      </main>

      {toast && (
        <div style={{ ...S.toast, background: toast.type === "success" ? "#2e1a28" : "#2e1a1a", borderLeft: `3px solid ${toast.type === "success" ? pink.main : pink.red}` }}>
          {toast.type === "success" ? "✓" : "✕"} {toast.msg}
        </div>
      )}
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({ data }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());

  function prevMonth() {
    if (month === 0) { setMonth(11); setYear(y => y - 1); }
    else setMonth(m => m - 1);
  }
  function nextMonth() {
    if (year === now.getFullYear() && month >= now.getMonth()) return;
    if (month === 11) { setMonth(0); setYear(y => y + 1); }
    else setMonth(m => m + 1);
  }

  const monthStr = `${year}-${String(month + 1).padStart(2, "0")}`;
  const monthly = data.transactions.filter(t => t.date?.startsWith(monthStr));
  const totalIn = monthly.filter(t => t.type === "entrada").reduce((s, t) => s + Number(t.amount), 0);
  const totalOut = monthly.filter(t => t.type === "saida").reduce((s, t) => s + Number(t.amount), 0);
  const profit = totalIn - totalOut;

  const byCategory = {};
  monthly.filter(t => t.type === "entrada").forEach(t => {
    byCategory[t.category] = (byCategory[t.category] || 0) + Number(t.amount);
  });
  const topCats = Object.entries(byCategory).sort((a, b) => b[1] - a[1]).slice(0, 4);
  const recent = [...data.transactions].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
  const monthLabel = new Date(year, month).toLocaleString("pt-BR", { month: "long", year: "numeric" });
  const isCurrentMonth = year === now.getFullYear() && month === now.getMonth();

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
        <button onClick={prevMonth} style={S.monthBtn}>‹</button>
        <h2 style={{ ...S.sectionTitle, marginBottom: 0, flex: 1, textAlign: "center", fontSize: 20 }}>
          Resumo de <span style={{ color: pink.main }}>{monthLabel}</span>
        </h2>
        <button onClick={nextMonth} style={{ ...S.monthBtn, opacity: isCurrentMonth ? 0.3 : 1 }} disabled={isCurrentMonth}>›</button>
      </div>

      <div style={S.kpiGrid}>
        <KPI label="Entradas" value={totalIn} color={pink.green} icon="↑" />
        <KPI label="Saídas" value={totalOut} color={pink.red} icon="↓" />
        <KPI label="Lucro" value={profit} color={profit >= 0 ? pink.main : pink.red} icon="◈" />
      </div>

      <div style={S.twoCol}>
        <div style={S.card}>
          <div style={S.cardTitle}>Mais Vendidos (este mês)</div>
          {topCats.length === 0 ? (
            <p style={S.empty}>Nenhuma entrada registrada ainda.</p>
          ) : topCats.map(([cat, val]) => (
            <div key={cat} style={S.barRow}>
              <span style={S.barLabel}>{cat}</span>
              <div style={S.barTrack}>
                <div style={{ ...S.barFill, width: `${Math.min(100, (val / totalIn) * 100)}%` }} />
              </div>
              <span style={S.barValue}>{fmt(val)}</span>
            </div>
          ))}
        </div>
        <div style={S.card}>
          <div style={S.cardTitle}>Últimas Transações</div>
          {recent.length === 0 ? (
            <p style={S.empty}>Nenhuma transação ainda.</p>
          ) : recent.map(t => (
            <div key={t.id} style={S.txRow}>
              <div>
                <div style={S.txDesc}>{t.description}</div>
                <div style={S.txMeta}>{t.category} · {t.date}</div>
              </div>
              <div style={{ ...S.txAmount, color: t.type === "entrada" ? pink.green : pink.red }}>
                {t.type === "entrada" ? "+" : "-"}{fmt(t.amount)}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function KPI({ label, value, color, icon }) {
  return (
    <div style={{ ...S.kpiCard, borderColor: color + "44" }}>
      <div style={{ ...S.kpiIcon, color }}>{icon}</div>
      <div style={{ ...S.kpiValue, color }}>{fmt(value)}</div>
      <div style={S.kpiLabel}>{label}</div>
    </div>
  );
}

// ─── TRANSACTIONS ─────────────────────────────────────────────────────────────
function Transactions({ data, addTransaction, removeTransaction, showToast }) {
  const [form, setForm] = useState({ type: "entrada", description: "", amount: "", category: categories[0], date: today() });
  const [filter, setFilter] = useState("todos");
  const [saving, setSaving] = useState(false);

  async function add() {
    if (!form.description || !form.amount) return showToast("Preencha descrição e valor", "error");
    setSaving(true);
    await addTransaction(form);
    setForm(f => ({ ...f, description: "", amount: "" }));
    setSaving(false);
  }

  const filtered = filter === "todos" ? data.transactions : data.transactions.filter(t => t.type === filter);
  const sorted = [...filtered].sort((a, b) => new Date(b.date) - new Date(a.date));

  return (
    <div>
      <h2 style={S.sectionTitle}>Lançamentos</h2>
      <div style={S.card}>
        <div style={S.cardTitle}>Novo Lançamento</div>
        <div style={S.formGrid}>
          <div style={S.typeToggle}>
            {["entrada", "saida"].map(t => (
              <button key={t} onClick={() => setForm(f => ({ ...f, type: t }))}
                style={{ ...S.typeBtn, ...(form.type === t ? (t === "entrada" ? S.typeBtnEntrada : S.typeBtnSaida) : {}) }}>
                {t === "entrada" ? "↑ Entrada" : "↓ Saída"}
              </button>
            ))}
          </div>
          <input style={S.input} placeholder="Descrição" value={form.description} onChange={e => setForm(f => ({ ...f, description: e.target.value }))} />
          <input style={S.input} placeholder="Valor (R$)" type="number" value={form.amount} onChange={e => setForm(f => ({ ...f, amount: e.target.value }))} />
          <select style={S.input} value={form.category} onChange={e => setForm(f => ({ ...f, category: e.target.value }))}>
            {categories.map(c => <option key={c}>{c}</option>)}
          </select>
          <input style={S.input} type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} />
          <button style={{ ...S.btnPrimary, opacity: saving ? 0.6 : 1 }} onClick={add} disabled={saving}>
            {saving ? "Salvando..." : "Adicionar"}
          </button>
        </div>
      </div>
      <div style={{ display: "flex", gap: 8, margin: "20px 0 12px" }}>
        {["todos", "entrada", "saida"].map(f => (
          <button key={f} onClick={() => setFilter(f)}
            style={{ ...S.filterBtn, ...(filter === f ? S.filterBtnActive : {}) }}>
            {f === "todos" ? "Todos" : f === "entrada" ? "↑ Entradas" : "↓ Saídas"}
          </button>
        ))}
      </div>
      {sorted.length === 0 ? <p style={S.empty}>Nenhum lançamento ainda.</p> : sorted.map(t => (
        <div key={t.id} style={{ ...S.txCard, borderLeft: `3px solid ${t.type === "entrada" ? pink.green : pink.red}` }}>
          <div style={{ flex: 1 }}>
            <div style={S.txDesc}>{t.description}</div>
            <div style={S.txMeta}>{t.category} · {t.date}</div>
          </div>
          <div style={{ ...S.txAmount, color: t.type === "entrada" ? pink.green : pink.red }}>
            {t.type === "entrada" ? "+" : "-"}{fmt(t.amount)}
          </div>
          <button onClick={() => removeTransaction(t.id)} style={S.btnRemove}>✕</button>
        </div>
      ))}
    </div>
  );
}

// ─── PRODUCTS ─────────────────────────────────────────────────────────────────
function Products({ data, addProduct, removeProduct, showToast }) {
  const [form, setForm] = useState({ name: "", category: categories[0], cost: "", price: "" });
  const [saving, setSaving] = useState(false);

  async function add() {
    if (!form.name || !form.cost || !form.price) return showToast("Preencha todos os campos", "error");
    setSaving(true);
    await addProduct(form);
    setForm(f => ({ ...f, name: "", cost: "", price: "" }));
    setSaving(false);
  }

  return (
    <div>
      <h2 style={S.sectionTitle}>Lucro por Produto</h2>
      <div style={S.card}>
        <div style={S.cardTitle}>Novo Produto</div>
        <div style={S.formGrid}>
          <input style={S.input} placeholder="Nome do produto" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} />
          <select style={S.input} value={form.category} onChange={e => setForm(f => ({ ...f, category: e.target.value }))}>
            {categories.map(c => <option key={c}>{c}</option>)}
          </select>
          <input style={S.input} placeholder="Custo (R$)" type="number" value={form.cost} onChange={e => setForm(f => ({ ...f, cost: e.target.value }))} />
          <input style={S.input} placeholder="Preço de venda (R$)" type="number" value={form.price} onChange={e => setForm(f => ({ ...f, price: e.target.value }))} />
          <button style={{ ...S.btnPrimary, opacity: saving ? 0.6 : 1 }} onClick={add} disabled={saving}>
            {saving ? "Salvando..." : "Calcular e Salvar"}
          </button>
        </div>
      </div>
      {data.products.length === 0 ? <p style={S.empty}>Nenhum produto cadastrado ainda.</p> : (
        <div style={S.productGrid}>
          {data.products.map(p => {
            const lucro = Number(p.price) - Number(p.cost);
            const margem = ((lucro / Number(p.price)) * 100).toFixed(1);
            return (
              <div key={p.id} style={S.productCard}>
                <div style={S.productName}>{p.name}</div>
                <div style={S.productCat}>{p.category}</div>
                <div style={S.productRow}><span>Custo</span><span style={{ color: pink.red }}>{fmt(p.cost)}</span></div>
                <div style={S.productRow}><span>Venda</span><span style={{ color: pink.green }}>{fmt(p.price)}</span></div>
                <div style={{ ...S.productRow, fontWeight: 700, borderTop: `1px solid ${pink.border}`, paddingTop: 8, marginTop: 4 }}>
                  <span>Lucro</span>
                  <span style={{ color: lucro >= 0 ? pink.main : pink.red }}>{fmt(lucro)}</span>
                </div>
                <div style={S.margemBar}>
                  <div style={{ ...S.margemFill, width: `${Math.min(100, Math.max(0, parseFloat(margem)))}%` }} />
                </div>
                <div style={{ textAlign: "right", fontSize: 11, color: pink.main, marginTop: 4 }}>Margem: {margem}%</div>
                <button onClick={() => removeProduct(p.id)} style={{ ...S.btnRemove, marginTop: 12, width: "100%" }}>✕ Remover</button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── BUDGETS ──────────────────────────────────────────────────────────────────
function Budgets({ data, addBudget, updateBudgetStatus, removeBudget, showToast }) {
  const [form, setForm] = useState({ client: "", event: "", items: "", total: "", date: today() });
  const [saving, setSaving] = useState(false);

  async function add() {
    if (!form.client || !form.total) return showToast("Preencha cliente e valor", "error");
    setSaving(true);
    await addBudget(form);
    setForm(f => ({ ...f, client: "", event: "", items: "", total: "" }));
    setSaving(false);
  }

  const statusColor = { pendente: "#f4c77a", aprovado: pink.green, recusado: pink.red };

  return (
    <div>
      <h2 style={S.sectionTitle}>Orçamentos de Clientes</h2>
      <div style={S.card}>
        <div style={S.cardTitle}>Novo Orçamento</div>
        <div style={S.formGrid}>
          <input style={S.input} placeholder="Nome do cliente" value={form.client} onChange={e => setForm(f => ({ ...f, client: e.target.value }))} />
          <input style={S.input} placeholder="Evento (ex: Aniversário 30 anos)" value={form.event} onChange={e => setForm(f => ({ ...f, event: e.target.value }))} />
          <input style={S.input} placeholder="Itens (ex: 50 convites, topo de bolo)" value={form.items} onChange={e => setForm(f => ({ ...f, items: e.target.value }))} />
          <input style={S.input} placeholder="Valor total (R$)" type="number" value={form.total} onChange={e => setForm(f => ({ ...f, total: e.target.value }))} />
          <input style={S.input} type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} />
          <button style={{ ...S.btnPrimary, opacity: saving ? 0.6 : 1 }} onClick={add} disabled={saving}>
            {saving ? "Salvando..." : "Salvar Orçamento"}
          </button>
        </div>
      </div>
      {data.budgets.length === 0 ? <p style={S.empty}>Nenhum orçamento ainda.</p> : data.budgets.map(b => (
        <div key={b.id} style={{ ...S.txCard, borderLeft: `3px solid ${statusColor[b.status] || "#f4c77a"}` }}>
          <div style={{ flex: 1 }}>
            <div style={S.txDesc}>{b.client} <span style={{ color: pink.main, fontWeight: 400 }}>· {b.event}</span></div>
            <div style={S.txMeta}>{b.items} · {b.date}</div>
            <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
              {["pendente", "aprovado", "recusado"].map(s => (
                <button key={s} onClick={() => updateBudgetStatus(b.id, s)}
                  style={{ ...S.statusBtn, background: b.status === s ? (statusColor[s] + "33") : "transparent", borderColor: statusColor[s], color: b.status === s ? statusColor[s] : "#666" }}>
                  {s.charAt(0).toUpperCase() + s.slice(1)}
                </button>
              ))}
            </div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ ...S.txAmount, fontSize: 18, color: pink.main }}>{fmt(b.total)}</div>
            <button onClick={() => removeBudget(b.id)} style={{ ...S.btnRemove, marginTop: 8 }}>✕</button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function fmt(v) {
  return new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(v || 0);
}
function today() {
  return new Date().toISOString().split("T")[0];
}

// ─── STYLES ───────────────────────────────────────────────────────────────────
const S = {
  root: { minHeight: "100vh", background: pink.bg, color: pink.text, fontFamily: "'Georgia', serif", position: "relative" },
  bgDecor1: { position: "fixed", top: -120, right: -120, width: 400, height: 400, background: "radial-gradient(circle, #f4a7c318, transparent 70%)", pointerEvents: "none", zIndex: 0 },
  bgDecor2: { position: "fixed", bottom: -80, left: -80, width: 300, height: 300, background: "radial-gradient(circle, #d4729a14, transparent 70%)", pointerEvents: "none", zIndex: 0 },
  loading: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh" },
  spinner: { width: 36, height: 36, border: `3px solid ${pink.main}44`, borderTop: `3px solid ${pink.main}`, borderRadius: "50%", animation: "spin 1s linear infinite" },
  header: { background: "#1a1018ee", backdropFilter: "blur(12px)", borderBottom: `1px solid ${pink.border}`, position: "sticky", top: 0, zIndex: 100 },
